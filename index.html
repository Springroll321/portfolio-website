<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>patrick m</title>
    <script>
      // Robust Polyfill for crypto.randomUUID for insecure contexts (HTTP)
      (function() {
        try {
          if (!window.crypto) window.crypto = {};
          if (!window.crypto.randomUUID) {
            window.crypto.randomUUID = function() {
              return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, function(c) {
                var cryptoObj = window.crypto || window.msCrypto;
                var rnd = (cryptoObj && cryptoObj.getRandomValues) 
                  ? cryptoObj.getRandomValues(new Uint8Array(1))[0]
                  : Math.floor(Math.random() * 256);
                return (c ^ rnd & 15 >> c / 4).toString(16);
              });
            };
          }
        } catch (e) {
          console.warn("Crypto polyfill failed, but attempting to continue...", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
