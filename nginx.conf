# Redirect all HTTP to HTTPS
server {
    listen 80;
    server_name patricktech.site www.patricktech.site;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name patricktech.site www.patricktech.site;

    # SSL certs
    ssl_certificate /etc/letsencrypt/live/patricktech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/patricktech.site/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Default location for SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve and cache static assets
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";

        # Ensure WebP images render
        types {
            image/webp webp;
            image/avif avif;       # Optional for AVIF support
        }
    }

    location /css/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location /js/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # SPA fallback for 404
    error_page 404 /index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_vary on;
}