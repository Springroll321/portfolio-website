server {
    listen 80;
    server_name patricktech.site www.patricktech.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name patricktech.site www.patricktech.site;

    ssl_certificate /etc/letsencrypt/live/patricktech.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/patricktech.site/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /images/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}